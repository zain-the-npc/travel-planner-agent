<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyage — AI Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #12213A;
    --navy-deep: #0B1626;
    --sand: #EFE7D6;
    --gold: #C9A227;
    --sky: #5B93A6;
    --ink: #E9E2D0;
    --muted: #9AA6B8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy-deep);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }

  .hero {
    text-align: center;
    max-width: 600px;
    margin-bottom: 48px;
  }

  .hero .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1.1;
    color: var(--sand);
  }

  .hero p {
    color: var(--muted);
    font-size: 16px;
    margin-top: 14px;
  }

  form {
    background: var(--navy);
    border: 1px solid rgba(233, 226, 208, 0.1);
    border-radius: 4px;
    padding: 32px;
    width: 100%;
    max-width: 640px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(233, 226, 208, 0.25);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    padding: 8px 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--gold); }
  input::placeholder { color: rgba(154, 166, 184, 0.6); }

  button {
    grid-column: 1 / -1;
    background: var(--gold);
    color: var(--navy-deep);
    border: none;
    border-radius: 2px;
    padding: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: wait; }

  /* Boarding pass ticket */
  .ticket {
    width: 100%;
    max-width: 640px;
    background: var(--sand);
    color: var(--navy-deep);
    border-radius: 6px;
    position: relative;
    display: none;
    overflow: hidden;
  }

  .ticket.visible { display: block; }

  .ticket-header {
    background: var(--navy);
    color: var(--sand);
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .ticket-header .gold { color: var(--gold); }

  .perforation {
    height: 0;
    border-top: 2px dashed rgba(11, 22, 38, 0.2);
    margin: 0 28px;
    position: relative;
  }

  .perforation::before, .perforation::after {
    content: '';
    position: absolute;
    top: -10px;
    width: 20px;
    height: 20px;
    background: var(--navy-deep);
    border-radius: 50%;
  }
  .perforation::before { left: -38px; }
  .perforation::after { right: -38px; }

  .ticket-body {
    padding: 28px;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .ticket-body strong { color: var(--sky); }

  .status {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--gold);
    text-align: center;
    min-height: 20px;
    margin-top: -10px;
  }

  footer {
    margin-top: 60px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  @media (max-width: 560px) {
    form { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <div class="hero">
    <div class="eyebrow">Autonomous Trip Planning</div>
    <h1>Where to, next?</h1>
    <p>An AI agent finds real flights and real places — you just say where.</p>
  </div>

  <form id="tripForm">
    <div class="field">
      <label for="origin">From (airport code)</label>
      <input id="origin" placeholder="LHR" required maxlength="3">
    </div>
    <div class="field">
      <label for="destAirport">To (airport code)</label>
      <input id="destAirport" placeholder="IST" required maxlength="3">
    </div>
    <div class="field">
      <label for="destCity">Destination city</label>
      <input id="destCity" placeholder="Istanbul" required>
    </div>
    <div class="field">
      <label for="date">Departure date</label>
      <input id="date" type="date" required>
    </div>
    <div class="field full">
      <label for="budget">Total budget (USD)</label>
      <input id="budget" type="number" placeholder="500" required min="1">
    </div>
    <button type="submit" id="submitBtn">Plan my trip</button>
  </form>

  <div class="status" id="status"></div>

  <div class="ticket" id="ticket">
    <div class="ticket-header">
      <span id="ticketRoute">LHR → IST</span>
      <span class="gold" id="ticketDate">2026-09-15</span>
    </div>
    <div class="perforation"></div>
    <div class="ticket-body" id="ticketBody"></div>
  </div>

  <footer>Built with LangGraph + MCP + GPT-4o-mini</footer>

  <script>
    const API_URL = "http://localhost:8000/plan-trip";

    document.getElementById('tripForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const origin = document.getElementById('origin').value.toUpperCase();
      const destAirport = document.getElementById('destAirport').value.toUpperCase();
      const destCity = document.getElementById('destCity').value;
      const date = document.getElementById('date').value;
      const budget = parseFloat(document.getElementById('budget').value);

      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      const ticket = document.getElementById('ticket');

      btn.disabled = true;
      btn.textContent = "Agent is thinking...";
      status.textContent = "Calling flights + places tools...";
      ticket.classList.remove('visible');

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            origin,
            destination_airport: destAirport,
            destination_city: destCity,
            departure_date: date,
            budget: budget,
          }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();

        document.getElementById('ticketRoute').textContent = `${origin} → ${destAirport}`;
        document.getElementById('ticketDate').textContent = date;
        document.getElementById('ticketBody').textContent = data.answer;
        ticket.classList.add('visible');
        status.textContent = "";
      } catch (err) {
        status.textContent = "Something went wrong: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Plan my trip";
      }
    });
  </script>

</body>
</html>
